services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    init: true
    working_dir: /workspaces/ambient-agent
    volumes:
      - ..:/workspaces/ambient-agent:cached
    environment:
      GRAPH_DATABASE_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ambient-agent-dev
      NEO4J_DATABASE: neo4j
      GRAPH_MIGRATE_SQLITE: "0"
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/ambient-agent-dev
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  neo4j_data:
