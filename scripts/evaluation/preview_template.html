<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Widget Live Preview - {{ SCENARIO }} ({{ MODE }})</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
    }

    * {
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .preview-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .preview-header h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-a2ui {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.4);
    }

    .badge-direct {
      background: rgba(236, 72, 153, 0.2);
      color: #fbcfe8;
      border: 1px solid rgba(236, 72, 153, 0.4);
    }

    /* Scoped container simulating card size */
    .widget-viewport {
      width: 500px;
      min-height: 380px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Direct UI Scoped CSS Container */
    [data-widget-scope="widget-preview"] {
      width: 100%;
      height: 100%;
    }

    /* Scoped CSS from Direct UI */
    {{ COMPONENT_CSS }}

    /* --- Pre-defined A2UI Component Styles --- */
    .a2ui-column {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .a2ui-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
    }
    .a2ui-card {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
    }
    .a2ui-text {
      color: #f8fafc;
      font-size: 14px;
    }
    .a2ui-button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .a2ui-button-primary {
      background: #4f46e5;
      color: #ffffff;
    }
    .a2ui-button-primary:hover {
      background: #4338ca;
    }
    .a2ui-button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .a2ui-button-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .a2ui-button-danger {
      background: #ef4444;
      color: #ffffff;
    }
    .a2ui-button-danger:hover {
      background: #dc2626;
    }
    .a2ui-textfield-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-bottom: 12px;
    }
    .a2ui-textfield-label {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
    .a2ui-textfield-input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .a2ui-textfield-input:focus {
      border-color: #6366f1;
    }
    .a2ui-checkbox-container {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 8px;
    }
    .a2ui-checkbox-input {
      accent-color: #6366f1;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .a2ui-checkbox-label {
      font-size: 14px;
      color: #e2e8f0;
    }
    .a2ui-list {
      display: flex;
      flex-direction: column;
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }
    .a2ui-list-item {
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .a2ui-list-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .a2ui-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .a2ui-table th {
      text-align: left;
      padding: 8px 10px;
      color: #94a3b8;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 500;
    }
    .a2ui-table td {
      padding: 10px;
      color: #e2e8f0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .a2ui-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
  </style>
</head>
<body>

  <div class="preview-header">
    <h1>{{ TITLE }}</h1>
    <span class="badge badge-{{ MODE }}">{{ MODE_LABEL }}</span>
  </div>

  <!-- Isolated container simulating dashboard element -->
  <div class="widget-viewport" id="viewport">
    {% if MODE == 'direct' %}
      <div id="widget-root" data-widget-scope="widget-preview">
        {{ COMPONENT_HTML }}
      </div>
    {% else %}
      <div id="widget-root"></div>
    {% endif %}
  </div>

  <script>
    // --- Mock SDK Core & Graph Database ---
    const mockGraphData = {{ SCENARIO_MOCK_DATA }};
    const activeSubscriptions = [];
    const localState = {
      "/tasks/list": mockGraphData.Task || [],
      "/notes/list": mockGraphData.Note || [],
      "/events/list": mockGraphData.Event || [],
      "/form/taskTitle": "",
      "/form/noteTitle": "",
      "/form/noteContent": "",
      "/form/noteTags": "",
      "/form/eventTitle": "",
      "/form/eventDesc": "",
      "/form/eventStart": "",
      "/form/eventEnd": "",
      "/form/eventLoc": "",
      "/timer/elapsed": 0,
      "/timer/active": false
    };

    const registeredEvents = {};

    // Helper to resolve JSON Pointer path in local state
    function getPointer(obj, ptr) {
      if (ptr === '' || ptr === '/') return obj;
      const parts = ptr.split('/').slice(1);
      let current = obj;
      for (const part of parts) {
        const key = part.replace(/~1/g, '/').replace(/~0/g, '~');
        if (current === undefined || current === null || typeof current !== 'object') return undefined;
        current = current[key];
      }
      return current;
    }

    function setPointer(obj, ptr, value) {
      const parts = ptr.split('/').slice(1);
      let current = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        const key = parts[i].replace(/~1/g, '/').replace(/~0/g, '~');
        if (!(key in current) || typeof current[key] !== 'object') {
          current[key] = {};
        }
        current = current[key];
      }
      const lastKey = parts[parts.length - 1].replace(/~1/g, '/').replace(/~0/g, '~');
      current[lastKey] = value;
    }

    const stateObservers = {};

    const mockAmbient = {
      state: {
        get: (pointer) => getPointer(localState, pointer),
        set: (pointer, value) => {
          setPointer(localState, pointer, value);
          if (stateObservers[pointer]) {
            stateObservers[pointer].forEach(cb => cb(value));
          }
          // Re-render A2UI on state changes
          if (window.__a2uiRenderAll) {
            window.__a2uiRenderAll();
          }
        },
        onChange: (pointer, callback) => {
          if (!stateObservers[pointer]) {
            stateObservers[pointer] = [];
          }
          stateObservers[pointer].push(callback);
        }
      },
      graph: {
        subscribe: (query, callback) => {
          const subObj = { query, callback };
          activeSubscriptions.push(subObj);
          
          const trigger = () => {
            const qType = query.type;
            let list = mockGraphData[qType] || [];
            
            // Handle Task -> Note ASSOCIATED_WITH query
            if (query.relation === "ASSOCIATED_WITH" || (query.include && query.include.some(inc => inc.relation === "ASSOCIATED_WITH"))) {
              const fromId = query.from_id;
              if (fromId) {
                const relations = mockGraphData.Task_Note_ASSOCIATED_WITH || [];
                const targetIds = relations
                  .filter(rel => rel.from_id === fromId)
                  .map(rel => rel.to_id);
                list = list.filter(node => targetIds.includes(node.id));
              }
            }
            callback(list);
          };
          
          subObj._trigger = trigger;
          setTimeout(trigger, 0);
          
          return () => {
            const idx = activeSubscriptions.indexOf(subObj);
            if (idx !== -1) activeSubscriptions.splice(idx, 1);
          };
        },
        mutate: async (actions) => {
          for (const action of actions) {
            if (action.action === "create_node") {
              const listKey = `/${action.type.toLowerCase()}s/list`;
              const currentList = mockAmbient.state.get(listKey) || [];
              const newNode = { id: action.id, type: action.type, properties: action.properties };
              mockAmbient.state.set(listKey, [...currentList, newNode]);
              
              if (!mockGraphData[action.type]) mockGraphData[action.type] = [];
              mockGraphData[action.type].push(newNode);
            } else if (action.action === "create_edge") {
              if (action.type === "ASSOCIATED_WITH") {
                if (!mockGraphData.Task_Note_ASSOCIATED_WITH) {
                  mockGraphData.Task_Note_ASSOCIATED_WITH = [];
                }
                mockGraphData.Task_Note_ASSOCIATED_WITH.push({
                  from_id: action.from_id,
                  to_id: action.to_id
                });
              }
            } else if (action.action === "delete_node") {
              const nodeId = action.id;
              for (const [qType, arr] of Object.entries(mockGraphData)) {
                if (Array.isArray(arr)) {
                  mockGraphData[qType] = arr.filter(n => n.id !== nodeId);
                }
              }
              mockAmbient.state.set("/notes/list", mockGraphData.Note || []);
              mockAmbient.state.set("/tasks/list", mockGraphData.Task || []);
            }
          }
          
          // Re-trigger subscriptions
          activeSubscriptions.forEach(sub => {
            if (sub._trigger) sub._trigger();
          });
          
          return { success: true };
        }
      },
      ui: {
        on: (event, actionId, callback) => {
          registeredEvents[actionId] = callback;
        }
      },
      sendMessage: (msg) => console.log("sendMessage triggered:", msg),
      fullscreen: () => console.log("fullscreen requested"),
      minimize: () => console.log("minimize requested")
    };

    // --- A2UI Declarative Layout Renderer ---
    const layoutSpec = {{ LAYOUT_JSON }};
    
    if (layoutSpec) {
      const rootDiv = document.getElementById('widget-root');
      
      function buildComponent(comp) {
        if (!comp) return null;
        let el;
        
        switch (comp.type) {
          case 'Column':
            el = document.createElement('div');
            el.className = 'a2ui-column';
            if (comp.props && comp.props.gap) el.style.gap = comp.props.gap;
            if (comp.props && comp.props.padding) el.style.padding = comp.props.padding;
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Row':
            el = document.createElement('div');
            el.className = 'a2ui-row';
            if (comp.props && comp.props.gap) el.style.gap = comp.props.gap;
            if (comp.props && comp.props.padding) el.style.padding = comp.props.padding;
            if (comp.props && comp.props.align) {
              if (comp.props.align === 'center') el.style.alignItems = 'center';
              else if (comp.props.align === 'start') el.style.alignItems = 'flex-start';
              else if (comp.props.align === 'end') el.style.alignItems = 'flex-end';
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Card':
            el = document.createElement('div');
            el.className = 'a2ui-card';
            if (comp.props && comp.props.title) {
              const header = document.createElement('div');
              header.style.fontWeight = 'bold';
              header.style.marginBottom = '10px';
              header.textContent = comp.props.title;
              el.appendChild(header);
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Text':
            el = document.createElement('span');
            el.className = 'a2ui-text';
            if (comp.props && comp.props.text) {
              if (comp.props.text.binding) {
                el.textContent = mockAmbient.state.get(comp.props.text.binding) || "";
              } else {
                el.textContent = comp.props.text;
              }
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Button':
            el = document.createElement('button');
            el.className = 'a2ui-button';
            const variant = (comp.props && comp.props.variant) || 'secondary';
            el.classList.add(`a2ui-button-${variant}`);
            if (comp.props && comp.props.label) el.textContent = comp.props.label;
            if (comp.events && comp.events.onClick) {
              const actionId = comp.events.onClick.actionId;
              el.onclick = () => {
                if (registeredEvents[actionId]) registeredEvents[actionId]();
              };
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'TextField':
            el = document.createElement('div');
            el.className = 'a2ui-textfield-container';
            if (comp.props && comp.props.label) {
              const label = document.createElement('label');
              label.className = 'a2ui-textfield-label';
              label.textContent = comp.props.label;
              el.appendChild(label);
            }
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'a2ui-textfield-input';
            if (comp.props && comp.props.placeholder) input.placeholder = comp.props.placeholder;
            
            if (comp.props && comp.props.value && comp.props.value.binding) {
              const bindingPath = comp.props.value.binding;
              input.value = mockAmbient.state.get(bindingPath) || "";
              input.oninput = (e) => {
                mockAmbient.state.set(bindingPath, e.target.value);
              };
            }
            el.appendChild(input);
            if (comp.events && comp.events.onEnter) {
              const actionId = comp.events.onEnter.actionId;
              input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                  if (registeredEvents[actionId]) registeredEvents[actionId](e.target.value);
                }
              };
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Checkbox':
            el = document.createElement('label');
            el.className = 'a2ui-checkbox-container';
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'a2ui-checkbox-input';
            if (comp.props && comp.props.checked && comp.props.checked.binding) {
              const bindingPath = comp.props.checked.binding;
              chk.checked = !!mockAmbient.state.get(bindingPath);
              chk.onchange = (e) => {
                mockAmbient.state.set(bindingPath, e.target.checked);
                const actionId = comp.events && comp.events.onChange && comp.events.onChange.actionId;
                if (actionId && registeredEvents[actionId]) registeredEvents[actionId](e.target.checked);
              };
            }
            el.appendChild(chk);
            if (comp.props && comp.props.label) {
              const span = document.createElement('span');
              span.className = 'a2ui-checkbox-label';
              span.textContent = comp.props.label;
              el.appendChild(span);
            }
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'List':
            el = document.createElement('ul');
            el.className = 'a2ui-list';
            let items = [];
            if (comp.props && comp.props.items) {
              if (comp.props.items.binding) {
                items = mockAmbient.state.get(comp.props.items.binding) || [];
              } else {
                items = comp.props.items;
              }
            }
            items.forEach((item, idx) => {
              const li = document.createElement('li');
              li.className = 'a2ui-list-item';
              
              // Resolve text display
              if (typeof item === 'object') {
                li.textContent = item.properties ? (item.properties.title || item.properties.content || item.id) : JSON.stringify(item);
              } else {
                li.textContent = item;
              }
              
              if (comp.events && comp.events.onItemClick) {
                const actionId = comp.events.onItemClick.actionId;
                li.onclick = () => {
                  if (registeredEvents[actionId]) registeredEvents[actionId](item, idx);
                };
              }
              el.appendChild(li);
            });
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
            
          case 'Table':
            el = document.createElement('table');
            el.className = 'a2ui-table';
            if (comp.props && comp.props.columns) {
              const thead = document.createElement('thead');
              const tr = document.createElement('tr');
              comp.props.columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                tr.appendChild(th);
              });
              thead.appendChild(tr);
              el.appendChild(thead);
            }
            
            const tbody = document.createElement('tbody');
            let rows = [];
            if (comp.props && comp.props.rows) {
              if (comp.props.rows.binding) {
                rows = mockAmbient.state.get(comp.props.rows.binding) || [];
              } else {
                rows = comp.props.rows;
              }
            }
            rows.forEach((row, rowIdx) => {
              const tr = document.createElement('tr');
              
              // Process standard row array vs node list
              let cells = [];
              if (Array.isArray(row)) {
                cells = row;
              } else if (typeof row === 'object' && row.properties) {
                // Map properties based on columns
                const cols = comp.props.columns || [];
                cols.forEach(col => {
                  const key = col.toLowerCase();
                  cells.push(row.properties[key] || row.properties[col] || "");
                });
              }
              
              cells.forEach(cell => {
                const td = document.createElement('td');
                td.textContent = cell;
                tr.appendChild(td);
              });
              
              if (comp.events && comp.events.onRowClick) {
                const actionId = comp.events.onRowClick.actionId;
                tr.onclick = () => {
                  if (registeredEvents[actionId]) registeredEvents[actionId](row, rowIdx);
                };
              }
              tbody.appendChild(tr);
            });
            el.appendChild(tbody);
            if (comp.props && comp.props.style) Object.assign(el.style, comp.props.style);
            break;
        }
        
        el.setAttribute('data-a2ui-id', comp.id);
        return el;
      }
      
      window.__a2uiRenderAll = () => {
        // Map layout spec by parent relationship
        rootDiv.innerHTML = '';
        const compMap = {};
        layoutSpec.forEach(comp => {
          compMap[comp.id] = comp;
        });
        
        // Find roots (components not inside any child list)
        const childIds = new Set();
        layoutSpec.forEach(comp => {
          if (comp.children) {
            comp.children.forEach(cid => childIds.add(cid));
          }
        });
        
        const roots = layoutSpec.filter(comp => !childIds.has(comp.id));
        
        function renderTree(comp, parentNode) {
          const node = buildComponent(comp);
          if (!node) return;
          parentNode.appendChild(node);
          
          if (comp.children) {
            comp.children.forEach(cid => {
              const childComp = compMap[cid];
              if (childComp) {
                // If it's a Card or list, sometimes children go to subcontainers, but in Adjacency list we append directly
                renderTree(childComp, node);
              }
            });
          }
        }
        
        roots.forEach(r => {
          renderTree(r, rootDiv);
        });
      };
      
      // Initial render trigger
      window.__a2uiRenderAll();
    }

    // --- Load the Controller ---
    const runController = () => {
      try {
        const root = document.getElementById('widget-root');
        const runner = new Function('root', 'ambient', 'fetch', `
          {{ CONTROLLER_JS }}
        `);
        runner(root, mockAmbient, async () => new Response());
      } catch (err) {
        console.error("Widget runtime error:", err);
      }
    };
    
    // Execute after a tick so graph subscription resolves
    setTimeout(() => {
      runController();
      if (window.__a2uiRenderAll) {
        window.__a2uiRenderAll();
      }
    }, 10);
  </script>
</body>
</html>
