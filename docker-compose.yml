services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-ambient-agent-dev}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CODEX_HOST_BRIDGE_URL: ${CODEX_HOST_BRIDGE_URL:-http://host.docker.internal:8765}
      CODEX_HOST_BRIDGE_TOKEN: ${CODEX_HOST_BRIDGE_TOKEN:-}
      GRAPH_DATABASE_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ambient-agent-dev}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      GRAPH_MIGRATE_SQLITE: ${GRAPH_MIGRATE_SQLITE:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app/backend
      - ./forward:/app/forward
      - ./scripts:/app/scripts
      - ./workspace:/app/workspace
      - ./tests:/app/tests
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
